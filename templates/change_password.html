<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("app-theme") || "light";
            document.documentElement.dataset.theme = savedTheme;
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/setting.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body data-role-theme="{{ role_theme }}">
<main class="setting-page">
    <section class="settings-topbar">
        <a href="{{ url_for('setting') }}" class="back-link"><i class="fa-solid fa-arrow-left"></i></a>
        <h2>Change Password</h2>
    </section>
    <div class="settings-feedback" id="settingsFeedback" hidden></div>
    <section class="settings-panel" style="display: block;">
        <form id="passwordForm" class="single-panel-form">
            <input type="password" name="current_password" placeholder="Current Password" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit" class="settings-submit">Change Password</button>
        </form>
    </section>
</main>
<script src="{{ url_for('static', filename='js/setting.js') }}"></script>
</body>
</html>
